<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pagina Principal</title>
</head>
<body>
    <h1>PROJETO - Gestão Acervo Bibliotecário</h1>
    <hr>
    <h2>MENU INICIAL</h2>
    <a href="listaLivros.html"><button>Listar Livros</button></a>
    <span>|||</span>
    <a href="movimentarEstoque.html"><button>Gestão de Estoque</button></a>
    <span>|||</span>
    <button id="btnLogout">Logout</button>
    <h3 id="mensagem"></h3>

    <script>
        function logout(){
            sessionStorage.clear();
            window.location.href = "index.html";
        }

        document.addEventListener("DOMContentLoaded", () => {
            const usuario = JSON.parse(sessionStorage.getItem('usuario'));
            if(!usuario) {
                window.location.href = "index.html";
            }
            const msg = document.getElementById('mensagem');
            msg.textContent = `Bem vindo -  ${usuario.nome} ${usuario.sobrenome} !😍🍿`;

            document.getElementById('btnLogout'). addEventListener('click', logout);
        });
    </script>
</body>
</html>
