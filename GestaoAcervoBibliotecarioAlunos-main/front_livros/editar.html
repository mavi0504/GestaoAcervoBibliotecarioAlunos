<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atualizar Livro</title>
</head>
<body>
    <h1>Atualizar Livros</h1>
    <form id="formLivro">
        <label>
            id:
            <input type="number" id="id" required disabled>
        </label>
        <br>
        <label>
            Titulo:
            <input type="text" id="titulo" required>
        </label>
        <br>
        <label>
            Descricao:
            <input type="text" id="descricao" required>
        </label>
        <br>
        <label>
            Autor:
            <input type="text" id="autor" required>
        </label>
        <br>
        <button type="submit">Atualizar Livro</button>
        <br>
    </form>

    <p id="mensagem"></p>

    <script>
        const API_BASE = "http://localhost/Aulas_PBE2/GestaoAcervoBibliotecarioAlunos/GestaoAcervoBibliotecarioAlunos-main/api_livros";
        
        async function getLivro(id) {
            try{
                const resposta = await fetch(`${API_BASE}/livroId?id=${id}`);
                if(!resposta.ok){
                    const erroData = await resposta.json();
                    throw new Error(erroData.message || `Erro HTTP: ${resposta.status}`);
                }
                const livro = await resposta.json();
                return livro;
            }catch(erro){
                throw erro;
            }
        }

        function preencherForm(dados){
            document.getElementById('id').value = dados.id_livro;
            document.getElementById('titulo').value = dados.titulo;
            document.getElementById('autor').value = dados.autor;
            document.getElementById('descricao').value = dados.descricao;
        }

        function getLivroFormData(){
            return {
                id: document.getElementById('id').value,
                titulo: document.getElementById('titulo').value,
                autor: document.getElementById('autor').value,
                descricao: document.getElementById('descricao').value
            }
        }

        async function atualizarLivro(livro){
            try{
                const resposta = await fetch(`${API_BASE}/livro`, {
                    method: 'PUT',
                    headers: {'Content-type': 'application/json'},
                    body: JSON.stringify(livro)
                });
                const dados = await resposta.json();
                if (!resposta.ok){
                    throw new Error(`HTTP: ${resposta.status} - ${dados.message}`);
                }
                return dados;
            }catch(erro){
                throw erro;
            }
        }

        async function enviarForm(){
            event.preventDefault();
            const form = document.getElementById('formLivro');
            const msg = document.getElementById('mensagem');

            const livro = await getLivroFormData();

            try {
                const resultado = await atualizarLivro(livro);
                msg.textContent = "Livro atualizado com sucesso!";
                msg.style.color = "green";
            }catch(erro){
                msg.textContent = `Erro ao atualizar o Livro: ${erro}`;
                msg.style.color = "red";
            }
        }

        document.addEventListener("DOMContentLoaded", async () => {
            //toda vez que a pagina carregar buscar dados preencher tela
            const params = new URLSearchParams(window.location.search);
            const id = params.get("id");
            const dados = await getLivro(id);
            preencherForm(dados);

            //acao do botao Atualizar
            document.getElementById('formLivro').addEventListener('submit', enviarForm);
        })
    </script>
</body>
</html>
